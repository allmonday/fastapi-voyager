<!doctype html>
<html>
  <head>
    <title>FastAPI Voyager</title>
    <meta name="description" content="Visualize API routing tree and dependencies" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Voyager" />
    <link
      rel="stylesheet"
      href="<!-- STATIC_PATH -->/graphviz.svg.css<!-- VERSION_PLACEHOLDER -->"
    />
    <!-- App Icons / Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="<!-- STATIC_PATH -->/icon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="<!-- STATIC_PATH -->/icon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="<!-- STATIC_PATH -->/icon/favicon-16x16.png"
    />
    <link rel="icon" href="<!-- STATIC_PATH -->/icon/favicon.ico" sizes="any" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <!-- highlight.js CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />
  </head>
  <style>
    :root {
      --q-primary: <!-- THEME_COLOR -->;
    }
    html,
    body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #graph {
      flex: 1 1 auto;
      overflow: auto;
    }
    .inherit-flow {
      stroke-dasharray: 8 6;
      stroke-linecap: round;
      animation: dash 2s linear infinite;
      animation-direction: reverse;
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -14;
      }
    }
    .adjust-fit {
      height: calc(100vh - 54px);
    }
    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }
    @keyframes octocat-wave {
      0%,
      100% {
        transform: rotate(0);
      }
      20%,
      60% {
        transform: rotate(-25deg);
      }
      40%,
      80% {
        transform: rotate(10deg);
      }
    }
    @media (max-width: 500px) {
      .github-corner:hover .octo-arm {
        animation: none;
      }
      .github-corner .octo-arm {
        animation: octocat-wave 560ms ease-in-out;
      }
    }
    .tag-navigator-collapse-btn-right {
      position: absolute;
      bottom: 8px;
      left: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--q-primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: all 0.2s ease;
    }
    .tag-navigator-collapse-btn-right:hover {
      filter: brightness(0.9);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }
    #app-loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      z-index: 9999;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Segoe UI,
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
      color: var(--q-primary);
    }
    .loading-text {
      font-size: 14px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 148, 133, 0.2);
      border-top-color: var(--q-primary);
      border-radius: 50%;
      animation: frv-spin 0.8s linear infinite;
    }
    @keyframes frv-spin {
      to {
        transform: rotate(360deg);
      }
    }
    body.app-loading #app {
      visibility: hidden;
    }
    body.app-loading #app-loading-overlay {
      display: flex;
    }
  </style>
  <body class="app-loading">
    <script>
      window.FRAMEWORK_THEME_COLOR = "<!-- THEME_COLOR -->"
    </script>
    <div id="app-loading-overlay" aria-busy="true" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <div class="loading-text">Loading…</div>
    </div>
    <div id="app"></div>

    <!-- CDN libraries (not bundled) -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"
      integrity="sha512-egJ/Y+22P9NQ9aIyVCh0VCOsfydyn8eNmqBy+y2CnJG+fpRIxXMS6jbWP8tVKp0jp+NO5n8WtMUAnNnGoJKi4w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"
      integrity="sha512-vc58qvvBdrDR4etbxMdlTt4GBQk1qjvyORR2nrsPsFPyrs+/u5c3+1Ct6upOgdZoIl7eq6k3a1UPDSNAQi/32A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://unpkg.com/@hpcc-js/wasm@2.20.0/dist/graphviz.umd.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/d3-graphviz/5.6.0/d3-graphviz.min.js"
      integrity="sha512-Le8HpIpS2Tc7SDHLM6AOgAKq6ZR4uDwLhjPSR20DtXE5dFb9xECHRwgpc1nxxnU0Dv+j6FNMoSddky5gyvI3lQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-mousewheel/3.1.13/jquery.mousewheel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-color/2.1.2/jquery.color.min.js"></script>

    <!-- highlight.js (async module) -->
    <script type="module">
      window.addEventListener("DOMContentLoaded", async () => {
        if (!window.hljs) {
          try {
            const { default: hljs } =
              await import("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/es/highlight.min.js")
            const { default: python } =
              await import("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/es/languages/python.min.js")
            hljs.registerLanguage("python", python)
            window.hljs = hljs
          } catch (e) {
            console.warn("Failed to preload highlight.js", e)
          }
        }
      })
    </script>

    <!-- Graphviz SVG renderer (local) -->
    <script src="<!-- STATIC_PATH -->/graphviz.svg.js<!-- VERSION_PLACEHOLDER -->"></script>

    <!-- Vite entry -->
    <script type="module" src="/src/main.js"></script>

    <!-- Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("[Voyager] SW registered:", reg.scope))
            .catch((err) => console.log("[Voyager] SW registration failed:", err))
        })
      }
    </script>
    <!-- GA_SNIPPET -->
  </body>
</html>
